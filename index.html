<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍧 บิงซูตู้ส้ม — ระบบเช็คยอดขาย</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, set, remove, onValue, get }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ════════════════════════════════════════════════════════
// 🔧 ตั้งค่า Firebase
// ════════════════════════════════════════════════════════
const firebaseConfig = {
apiKey: "AIzaSyC0IZc90rgTTxJdJRhYcO85Gf5D7FcW3nU",
authDomain: "bingsutusom-99fa0.firebaseapp.com",
databaseURL: "https://bingsutusom-99fa0-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "bingsutusom-99fa0",
storageBucket: "bingsutusom-99fa0.firebasestorage.app",
messagingSenderId: "1068089490766",
appId: "1:1068089490766:web:ea0ed4c707e6187b37b21f",
measurementId: "G-G52DVFE9XM"
};

// 🔧 Google Sheets Web App URL - ใส่ให้เรียบร้อยแล้ว
const SHEETS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbw7Jh91nyN21QkhpeXFEbkXN6QlTFki5PPxdZKPe1GuLRMdzXhr-aR5SROiAmvwTQP9dA/exec";

// ════════════════════════════════════════════════════════
const PRICE_M_MIN=55,PRICE_M_MAX=69,PRICE_L_MIN=79,PRICE_L_MAX=99;
const PRICE_BANANA=65,PRICE_CREAM=39,MAX_TOPPING=45,GP=0.34;

let app, db, recordsRef;
let allRecords = {};
let editingId = null;
let lastResult = null;
let isConfigured = false;

function checkConfig() {
  return firebaseConfig.apiKey && firebaseConfig.apiKey !== "YOUR_API_KEY";
}

function initFirebase() {
try {
app = initializeApp(firebaseConfig);
db = getDatabase(app);
recordsRef = ref(db, "records");
onValue(recordsRef, (snapshot) => {
  allRecords = snapshot.val() || {};
  renderHistory();
  updateAnalysis(); // อัปเดตการวิเคราะห์ทุกครั้งที่ข้อมูลเปลี่ยน
  if (!editingId) {
    setTimeout(() => tryAutoFill(g("f-date").value), 100);
  }
});
showStatus("🟢 เชื่อมต่อ Firebase และ Sheets แล้ว", "ok");
isConfigured = true;
g("setup-banner").style.display = "none";
} catch(e) {
showStatus("🔴 Firebase Error: " + e.message, "err");
}
}

// ════════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════════
const fmt = n => isNaN(n) ? "0.00" : parseFloat(n).toLocaleString("th-TH",{minimumFractionDigits:2,maximumFractionDigits:2});
const num = v => parseFloat(v) || 0;
const todayStr = () => new Date().toISOString().split("T")[0];
const soldQty = (p,a,l) => Math.max(0, num(p)+num(a)-num(l));
const g = id => document.getElementById(id);
const val = id => g(id)?.value || "";

function showStatus(msg, type) {
const el = g("conn-status");
el.textContent = msg;
el.style.background = type==="ok" ? "#d1fae5" : type==="err" ? "#fee2e2" : "#fff7ed";
el.style.color = type==="ok" ? "#065f46" : type==="err" ? "#991b1b" : "#92400e";
el.style.borderColor = type==="ok" ? "#6ee7b7" : type==="err" ? "#fca5a5" : "#fde68a";
}

// ════════════════════════════════════════════════════════
// FORM & CALCULATION
// ════════════════════════════════════════════════════════
window.onDateChange = function() {
if (editingId) return;
tryAutoFill(val("f-date"));
};

function tryAutoFill(date) {
  if (!date || editingId) return; 
  const recs = Object.values(allRecords);
  if (recs.length === 0) return;
  const pastRecords = recs.filter(r => r.date < date).sort((a, b) => b.date.localeCompare(a.date));
  const found = pastRecords[0];
  if (found) {
    g("m-prev").value = found.m_left ?? "0";
    g("l-prev").value = found.l_left ?? "0";
    g("b-prev").value = found.b_left ?? "0";
    g("c-prev").value = found.c_left ?? "0";
    ["m","l","b","c"].forEach(calcSold);
    g("auto-tag").style.display = "block";
    g("auto-tag").innerHTML = `✨ ดึงยอดคงเหลือจากวันที่ ${found.date} มาให้แล้ว`;
  } else {
    g("auto-tag").style.display = "none";
  }
}

window.calcSold = function(k) {
const s = soldQty(val(k+"-prev"), val(k+"-add"), val(k+"-left"));
g(k+"-sold").textContent = s;
lastResult = null;
};
window.calcGrabNet = function() { g("grab-net").textContent = fmt(num(val("grab-full"))*(1-GP))+" ฿"; };
window.calcLinemanNet = function() { g("lineman-net").textContent = fmt(num(val("lineman-full"))*(1-GP))+" ฿"; };

window.doCalc = function() {
const mSold=soldQty(val("m-prev"),val("m-add"),val("m-left"));
const lSold=soldQty(val("l-prev"),val("l-add"),val("l-left"));
const bSold=soldQty(val("b-prev"),val("b-add"),val("b-left"));
const cSold=soldQty(val("c-prev"),val("c-add"),val("c-left"));
const totalCups=mSold+lSold+bSold+cSold;
const minExp=mSold*PRICE_M_MIN+lSold*PRICE_L_MIN+bSold*PRICE_BANANA+cSold*PRICE_CREAM;
const maxExp=mSold*PRICE_M_MAX+lSold*PRICE_L_MAX+bSold*PRICE_BANANA+cSold*PRICE_CREAM;
const rangeMin=minExp, rangeMax=maxExp+totalCups*MAX_TOPPING;
const qr=num(val("pay-qr")), cash=num(val("pay-cash"));
const grabFull=num(val("grab-full")), linemanFull=num(val("lineman-full"));
const grabNet=grabFull*(1-GP), linemanNet=linemanFull*(1-GP);
const grossTotal=qr+cash+grabFull+linemanFull;
const netTotal=qr+cash+grabNet+linemanNet;
let statusKey, statusColor;
if (totalCups===0){statusKey="nodata";statusColor="#94a3b8"}
else if (grossTotal<rangeMin){statusKey="low";statusColor="#ef4444"}
else if (grossTotal>rangeMax){statusKey="high";statusColor="#f97316"}
else {statusKey="ok";statusColor="#22c55e"}
lastResult={mSold,lSold,bSold,cSold,totalCups,minExp,maxExp,rangeMin,rangeMax,qr,cash,grabFull,linemanFull,grabNet,linemanNet,grossTotal,netTotal,statusKey,statusColor};
renderResult(lastResult);
};

function renderResult(r) {
const box=g("result-box"); box.style.display="block"; box.style.borderColor=r.statusColor;
const banner=g("res-banner"); banner.style.background=r.statusColor;
const S={
ok:{icon:"✅",title:"ยอดถูกต้อง!",desc:`ยอดเงิน ${fmt(r.grossTotal)} ฿ อยู่ในช่วงที่เป็นไปได้`},
low:{icon:"❌",title:"ยอดเงินน้อยกว่าที่ควร",desc:`ยอดเงิน ${fmt(r.grossTotal)} ฿ ต่ำกว่าขั้นต่ำ ${fmt(r.rangeMin)} ฿`},
high:{icon:"⚠️",title:"ยอดเงินมากกว่าที่ควร",desc:`ยอดเงิน ${fmt(r.grossTotal)} ฿ เกินช่วงสูงสุด ${fmt(r.rangeMax)} ฿`},
nodata:{icon:"ℹ️",title:"ยังไม่มีข้อมูล",desc:"กรุณากรอกข้อมูลก่อน"},
};
const st=S[r.statusKey];
banner.textContent=st.icon+" "+st.title;
const row=(l,v,cls="")=>`<div class="res-row ${cls}"><span class="lbl">${l}</span><span class="val">${v}</span></div>`;
let h=`<div class="res-msg">${st.desc}</div><div class="divider"></div>`;
h+=row("รวมขายทั้งหมด",r.totalCups+" รายการ","bold");
h+=row("ยอดรวม Gross",fmt(r.grossTotal)+" ฿","bold accent");
h+=row("รวมสุทธิร้านได้รับ",fmt(r.netTotal)+" ฿","bold");
g("res-body").innerHTML=h;
const btn=g("btn-save");
btn.style.background=r.statusKey==="ok"?"#1c1917":r.statusColor;
btn.textContent=editingId?"💾 อัปเดตข้อมูล":"💾 บันทึกข้อมูลไป Sheets";
}

// ════════════════════════════════════════════════════════
// SAVE & SYNC
// ════════════════════════════════════════════════════════
window.doSave = async function() {
if (!lastResult){alert("กรุณากดคำนวณก่อนบันทึก");return}
if (!val("f-staff").trim()){alert("กรุณากรอกชื่อพนักงาน");return}
const btn=g("btn-save");
btn.textContent="⏳ กำลังบันทึก..."; btn.disabled=true;
const rec = {
id: editingId || Date.now().toString(),
date: val("f-date"), staff: val("f-staff").trim(),
m_prev:val("m-prev"),m_add:val("m-add"),m_left:val("m-left"),
l_prev:val("l-prev"),l_add:val("l-add"),l_left:val("l-left"),
b_prev:val("b-prev"),b_add:val("b-add"),b_left:val("b-left"),
c_prev:val("c-prev"),c_add:val("c-add"),c_left:val("c-left"),
pay_qr:val("pay-qr"), pay_cash:val("pay-cash"),
grab_full:val("grab-full"), lineman_full:val("lineman-full"),
savedAt: new Date().toISOString(),
result: lastResult
};
try {
await set(ref(db, "records/"+rec.id), rec);
await pushToSheets(rec);
btn.textContent = "✅ บันทึกสำเร็จ!";
setTimeout(() => { clearForm(); switchTab('history'); }, 1000);
} catch(e) {
alert("เกิดข้อผิดพลาด: "+e.message);
btn.disabled = false;
}
};

async function pushToSheets(rec) {
const r = rec.result;
const row = [rec.date, rec.staff, r.mSold, r.lSold, r.bSold, r.cSold, r.totalCups, num(rec.pay_qr), num(rec.pay_cash), num(rec.grab_full), r.grabNet.toFixed(2), num(rec.lineman_full), r.linemanNet.toFixed(2), r.grossTotal.toFixed(2), r.netTotal.toFixed(2), r.rangeMin.toFixed(2), r.rangeMax.toFixed(2), r.statusKey==="ok"?"ถูกต้อง":r.statusKey==="low"?"ยอดน้อย":"ยอดมาก", rec.id];
return fetch(SHEETS_WEBAPP_URL, {
  method:"POST",
  mode: "no-cors",
  headers:{"Content-Type":"application/json"},
  body: JSON.stringify({ action: editingId ? "update" : "append", id: rec.id, row })
});
}

window.deleteRecord = async function(id) {
if (!confirm("ลบข้อมูลนี้ใช่ไหม?")) return;
await remove(ref(db,"records/"+id));
fetch(SHEETS_WEBAPP_URL, {method:"POST", mode: "no-cors", headers:{"Content-Type":"application/json"},
body: JSON.stringify({action:"delete", id})}).catch(()=>{});
};

window.editRecord = function(id) {
const rec = allRecords[id]; if (!rec) return;
editingId = id;
g("f-date").value=rec.date; g("f-staff").value=rec.staff||"";
["m","l","b","c"].forEach(k=>{
g(k+"-prev").value=rec[k+"_prev"]||"0";
g(k+"-add").value=rec[k+"_add"]||"0";
g(k+"-left").value=rec[k+"_left"]||"0";
calcSold(k);
});
g("pay-qr").value=rec.pay_qr||"0"; g("pay-cash").value=rec.pay_cash||"0";
g("grab-full").value=rec.grab_full||"0"; calcGrabNet();
g("lineman-full").value=rec.lineman_full||"0"; calcLinemanNet();
if(rec.result){lastResult=rec.result;renderResult(rec.result)}
switchTab("check");
};

function clearForm(){
editingId=null; lastResult=null;
["f-staff","m-prev","m-add","m-left","l-prev","l-add","l-left","b-prev","b-add","b-left","c-prev","c-add","c-left","pay-qr","pay-cash","grab-full","lineman-full"]
.forEach(id=>{if(g(id))g(id).value=""});
g("f-date").value=todayStr();
["m","l","b","c"].forEach(k=>{if(g(k+"-sold"))g(k+"-sold").textContent="0"});
g("result-box").style.display="none";
g("btn-save").disabled=false;
}

// ════════════════════════════════════════════════════════
// ANALYSIS DASHBOARD (NEW!)
// ════════════════════════════════════════════════════════
function updateAnalysis() {
  const recs = Object.values(allRecords);
  if (recs.length === 0) return;

  const totalNet = recs.reduce((s, r) => s + (r.result?.netTotal || 0), 0);
  const totalCups = recs.reduce((s, r) => s + (r.result?.totalCups || 0), 0);
  const qrSum = recs.reduce((s, r) => s + num(r.pay_qr), 0);
  const cashSum = recs.reduce((s, r) => s + num(r.pay_cash), 0);
  const appSum = recs.reduce((s, r) => s + (r.result?.grabNet || 0) + (r.result?.linemanNet || 0), 0);

  g("ana-net").textContent = fmt(totalNet) + " ฿";
  g("ana-cups").textContent = totalCups.toLocaleString() + " แก้ว";
  g("ana-days").textContent = recs.length + " วัน";
  
  // Progress bar logic
  const max = Math.max(qrSum, cashSum, appSum, 1);
  g("bar-qr").style.width = (qrSum/totalNet*100) + "%";
  g("bar-cash").style.width = (cashSum/totalNet*100) + "%";
  g("bar-app").style.width = (appSum/totalNet*100) + "%";
}

// ════════════════════════════════════════════════════════
// TAB & HISTORY
// ════════════════════════════════════════════════════════
function renderHistory(){
const q=(g("search-q")?.value||"").toLowerCase();
const recs=Object.values(allRecords).sort((a,b)=>b.date.localeCompare(a.date));
const list=recs.filter(r=>r.date?.includes(q)||r.staff?.toLowerCase().includes(q));
const container=g("history-list"); if(!container)return;
if(!recs.length){
container.innerHTML=`<div class="empty">📭 ยังไม่มีข้อมูล</div>`; return;
}
container.innerHTML=list.map(rec=>{
const r=rec.result||{};
return `<div class="h-card" style="border-left-color:${r.statusColor}">
<div class="h-head" onclick="toggleCard('${rec.id}')">
  <div><div class="h-date">${rec.date}</div><div class="h-staff">${rec.staff}</div></div>
  <div style="text-align:right"><div class="h-gross">${fmt(r.netTotal)} ฿</div><div class="h-sub">${r.totalCups} รายการ</div></div>
</div>
<div class="h-body" id="hbody-${rec.id}" style="display:none">
  <div class="h-grid">
    <span>ยอด QR/เงินสด</span><span>${fmt(num(rec.pay_qr)+num(rec.pay_cash))} ฿</span>
    <span>ยอด App (สุทธิ)</span><span>${fmt((r.grabNet||0)+(r.linemanNet||0))} ฿</span>
  </div>
  <div class="h-btns">
    <button class="btn-ed" onclick="editRecord('${rec.id}')">✏️ แก้ไข</button>
    <button class="btn-del" onclick="deleteRecord('${rec.id}')">🗑️ ลบ</button>
  </div>
</div>
</div>`;
}).join("");
}

window.toggleCard = function(id){
const body=g("hbody-"+id); body.style.display=body.style.display==="none"?"block":"none";
};

window.switchTab = function(t){
g("page-check").style.display=t==="check"?"block":"none";
g("page-history").style.display=t==="history"?"block":"none";
g("tab-check").classList.toggle("active",t==="check");
g("tab-history").classList.toggle("active",t==="history");
if(t==="history") { renderHistory(); updateAnalysis(); }
};

window.addEventListener("load",()=>{
g("f-date").value=todayStr();
initFirebase();
});
</script>

<style>

</style>
</head>
<body>
<div class="wrap">

<div class="header">
<div class="logo-row">
<div class="logo-icon">🍧</div>
<div><div style="font-size:22px;font-weight:800">บิงซูตู้ส้ม</div><div style="font-size:12px;opacity:0.8">ระบบจัดการยอดขาย & Sheets Sync</div></div>
</div>
<div class="tabs">
<button class="tab active" id="tab-check" onclick="switchTab('check')">📋 กรอกข้อมูล</button>
<button class="tab" id="tab-history" onclick="switchTab('history')">📊 ประวัติ & วิเคราะห์</button>
</div>
</div>

<div id="conn-status" style="background:#fff7ed;color:#92400e;border-color:#fde68a">⏳ กำลังเชื่อมต่อ...</div>

<div id="page-check">
<div class="card">
<div class="card-title">📅 ข้อมูลทั่วไป</div>
<div class="field"><label class="fld-lbl">วันที่</label><input type="date" id="f-date" onchange="onDateChange()"></div>
<div class="field"><label class="fld-lbl">ชื่อพนักงาน</label><input type="text" id="f-staff" placeholder="ระบุชื่อ"></div>
</div>

<div class="card">
<div class="card-title">🍧 สต็อคและจำนวนขาย</div>
<div id="auto-tag" class="auto-tag"></div>
<div class="stock-row"><div class="fld-lbl">Size M</div><div class="stock-line">
<input type="number" class="inp-sm" id="m-prev" placeholder="ก่อน" oninput="calcSold('m')">
<span>+</span>
<input type="number" class="inp-sm" id="m-add" placeholder="เติม" oninput="calcSold('m')">
<span>-</span>
<input type="number" class="inp-sm" id="m-left" placeholder="เหลือ" oninput="calcSold('m')">
<div class="sold-box"><div class="sold-num" id="m-sold">0</div></div>
</div></div>
<div class="stock-row"><div class="fld-lbl">Size L</div><div class="stock-line">
<input type="number" class="inp-sm" id="l-prev" placeholder="ก่อน" oninput="calcSold('l')">
<span>+</span>
<input type="number" class="inp-sm" id="l-add" placeholder="เติม" oninput="calcSold('l')">
<span>-</span>
<input type="number" class="inp-sm" id="l-left" placeholder="เหลือ" oninput="calcSold('l')">
<div class="sold-box"><div class="sold-num" id="l-sold">0</div></div>
</div></div>
<div class="stock-row"><div class="fld-lbl">บานาน่า สปริท</div><div class="stock-line">
<input type="number" class="inp-sm" id="b-prev" placeholder="ก่อน" oninput="calcSold('b')">
<span>+</span>
<input type="number" class="inp-sm" id="b-add" placeholder="เติม" oninput="calcSold('b')">
<span>-</span>
<input type="number" class="inp-sm" id="b-left" placeholder="เหลือ" oninput="calcSold('b')">
<div class="sold-box"><div class="sold-num" id="b-sold">0</div></div>
</div></div>
<div class="stock-row"><div class="fld-lbl">ครีมชีสไข่มุก</div><div class="stock-line">
<input type="number" class="inp-sm" id="c-prev" placeholder="ก่อน" oninput="calcSold('c')">
<span>+</span>
<input type="number" class="inp-sm" id="c-add" placeholder="เติม" oninput="calcSold('c')">
<span>-</span>
<input type="number" class="inp-sm" id="c-left" placeholder="เหลือ" oninput="calcSold('c')">
<div class="sold-box"><div class="sold-num" id="c-sold">0</div></div>
</div></div>
</div>

<div class="card">
<div class="card-title">💰 ยอดเงินที่ได้รับ</div>
<div class="field"><label class="fld-lbl">💳 หน้าร้าน (QR)</label><input type="number" id="pay-qr" placeholder="0.00"></div>
<div class="field"><label class="fld-lbl">💵 หน้าร้าน (เงินสด)</label><input type="number" id="pay-cash" placeholder="0.00"></div>
<div class="field"><label class="fld-lbl">🚗 Grab (ยอดเต็ม)</label><input type="number" id="grab-full" placeholder="0.00" oninput="calcGrabNet()"></div>
<div class="field"><label class="fld-lbl">🟢 LINE MAN (ยอดเต็ม)</label><input type="number" id="lineman-full" placeholder="0.00" oninput="calcLinemanNet()"></div>
</div>

<div style="padding:0 12px"><button class="btn-calc" onclick="doCalc()">📊 คำนวณยอด</button></div>

<div id="result-box" class="res-box">
  <div id="res-banner" class="res-banner"></div>
  <div id="res-body" class="res-body"></div>
  <button id="btn-save" class="btn-save" onclick="doSave()">💾 บันทึกข้อมูลไป Sheets</button>
</div>
</div>

<div id="page-history" style="display:none">
  <div class="card" style="background:#fffcf5; border-color:#f97316">
    <div class="card-title">📈 วิเคราะห์ยอดขายสะสม</div>
    <div class="ana-grid">
      <div class="ana-item"><span class="ana-label">รายได้สุทธิ</span><div class="ana-val" id="ana-net">0 ฿</div></div>
      <div class="ana-item"><span class="ana-label">จำนวนขาย</span><div class="ana-val" id="ana-cups">0 แก้ว</div></div>
      <div class="ana-item"><span class="ana-label">รวมข้อมูล</span><div class="ana-val" id="ana-days">0 วัน</div></div>
    </div>
    <div class="ana-chart">
      <div class="legend"><span>QR</span><span>เงินสด</span><span>App (สุทธิ)</span></div>
      <div class="ana-bar-wrap">
        <div id="bar-qr" class="ana-bar" style="background:#3b82f6; width:0%"></div>
        <div id="bar-cash" class="ana-bar" style="background:#10b981; width:0%"></div>
        <div id="bar-app" class="ana-bar" style="background:#f59e0b; width:0%"></div>
      </div>
      <div style="font-size:10px; color:#999; text-align:center">สัดส่วนช่องทางการรับเงิน</div>
    </div>
  </div>

  <input type="text" id="search-q" class="search-inp" placeholder="🔍 ค้นหาวันที่/ชื่อพนักงาน..." oninput="renderHistory()">
  <div id="history-list"></div>
</div>

</div>
</body>
</html>
